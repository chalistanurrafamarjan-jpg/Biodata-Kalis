<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>

    <h1>Pendaftaran Mahasiswa Baru</h1>

    <form action="">
        <!-- Nama -->
        <label>Nama Lengkap</label>
        <input type="text" name="nama">
        <br><br>

        <!-- Email -->
        <label>Email Aktif:</label>
        <input type="email" name="email">
        <br><br>

        <!-- Password -->
        <label>Password</label>
        <input type="password" name="password">
        <br><br>

        <!-- Jenis Kelamin -->
        <label>Jenis Kelamin</label>
        <input type="radio" name="gender" id="kel_1" checked>
        <label for="kel_1">Laki-laki</label>

        <input type="radio" name="gender" id="kel_p">
        <label for="kel_p">Perempuan</label>
        <br><br>

        <!-- Hobi -->
        <label>Hobi :</label>
        <input type="checkbox" name="hobi" id="renang">
        <label for="renang">Renang</label>

        <input type="checkbox" name="hobi" id="otomotif">
        <label for="otomotif">Otomotif</label>
        <br><br>

        <!-- Tanggal Lahir -->
        <label>Tanggal lahir</label>
        <input type="date" name="tanggal">
        <br><br>

        <!-- Alamat -->
        <label>Alamat Lengkap:</label><br>
        <textarea cols="30" rows="5" placeholder="Tuliskan alamat di sini"></textarea>
        <br><br>

        <!-- File -->
        <input type="file" name="file">
        <br><br>

        <!-- Tombol -->
        <input type="submit" value="Submit">
        <input type="reset" value="Reset">
    </form>

</body>
</html>
